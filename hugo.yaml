# Hugo configuration file
title: Bln. N

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: true

menu:
  main:
    - name: Docs
      pageRef: /docs
      weight: 1
    - name: Blog Posts
      pageRef: /blog
      weight: 2
    - name: Portofolio
      pageRef: /portofolio
      weight: 3
    - name: About
      pageRef: /about
      weight: 4
    - name: Contact ↗
      url: "https://github.com/imfing"
      weight: 5
    - name: Search
      weight: 6
      params:
        type: search
    - name: GitHub
      weight: 7
      url: "https://github.com/imfing/hextra-starter-template"
      params:
        icon: github
    - name: Twitter
      weight: 8
      url: "https://twitter.com/"
      params:
        icon: x-twitter

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: true
    displayPoweredBy: true

  editURL:
    enable: true
    base: "https://github.com/imfing/hextra-starter-template/edit/main/content"
