# Hugo configuration file
title: Bln. N

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: true

menu:
  main:
    - name: Search
      weight: 1
      params:
        type: search  
    - name: Blog
      pageRef: /blog
      weight: 2
      type: link
      icon: document
    - name: Portofolio
      pageRef: /portofolio
      weight: 3
      type: link 
      icon: collection
    - name: About
      pageRef: /about
      weight: 4
      type: link
      icon: user

params:
  navbar:
    displayTitle: true
    displayLogo: true

  footer:
    displayCopyright: true
    displayPoweredBy: true

  editURL:
    enable: true
    base: "https://github.com/imfing/hextra-starter-template/edit/main/content"  

  
  # add 'terakhir kali di update' dan 'author' dari commit git
  # Display the last modification date
  displayUpdatedDate: true
  dateFormat: "January 2, 2006"
  # Display the author of the last modification
  displayUpdatedAuthor: true
  # kalau sisipkan/ada link eksternal otomatis kasih tanda panah
  externalLinkDecoration: true
  # Add Banner di seluruh halaman, buat nonaktifin di halaman tertentu tinggal false aja di halaman/file nya masing-masing
  banner:
    key: 'sambutan'
    message: |
      🎉 Welcome! To my Personal website~
  # add umami for analysis and tracking website
  analytics:
    umami:
      serverURL: "https://example.com"
      websiteID: "94db1cb1-74f4-4a40-ad6c-962362670409"

# add Google Analytics for analysis Website and tracking
services:
  googleAnalytics:
    ID: G-MEASUREMENT_ID

# Taxonomy (Tags and Category)
taxonomies:
  tag: "tags"
  category: "categories"
  
# Enable untuk akses icon.yaml
enableInlineShortcodes: true
