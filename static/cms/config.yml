backend:
  name: github
  repo: Lanlanb/Hextra-Hugo-Pages # ← GANTI INI! Contoh: bulan123/my-hextra-blog
  branch: main
  base_url: https://sveltia-cms-auth.bulannrlla.workers.dev   # atau domain cms kamu nanti
    

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime", default: "{{now}}"}
      - {label: "Draft", name: "draft", widget: "boolean", default: false}
      - {label: "Featured Image", name: "image", widget: "image"}
      - {label: "Tags", name: "tags", widget: "list"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "portofolio"
    label: "Portofolio / Proyek"
    folder: "content/portofolio"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Short Description", name: "description", widget: "text"}
      - {label: "Featured Image", name: "image", widget: "image"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "docs"
    label: "Docs / Dokumentasi"
    folder: "content/docs"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Body", name: "body", widget: "markdown"}
